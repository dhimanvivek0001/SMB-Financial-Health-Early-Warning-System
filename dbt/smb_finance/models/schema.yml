version: 2

models:
  - name: stg_transactions
    description: "Cleaned and standardised transaction data from the raw Online Retail dataset."
    columns:
      - name: invoice_id
        description: "Invoice number"
        tests: [not_null]
      - name: customer_id
        description: "Customer identifier"
        tests: [not_null]
      - name: revenue
        description: "Line-level revenue (quantity * unit_price)"
        tests: [not_null]

  - name: int_daily_revenue
    description: "Daily aggregation of revenue, invoices, and unique customers."
    columns:
      - name: revenue_date
        description: "Calendar date"
        tests: [not_null, unique]

  - name: int_weekly_summary
    description: "Weekly revenue rollup."
    columns:
      - name: week_start
        description: "Monday of the week"
        tests: [not_null, unique]

  - name: int_revenue_anomalies
    description: "Z-score anomaly scoring on daily revenue."
    columns:
      - name: revenue_date
        tests: [not_null]
      - name: z_score
        description: "Standard deviations from the mean daily revenue"

  - name: dim_customers
    description: "Customer dimension with lifetime value and order metrics."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: lifetime_value
        tests: [not_null]

  - name: dim_products
    description: "Product dimension with revenue and units sold."
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: fct_transactions
    description: "Core transaction fact table — one row per invoice line."
    columns:
      - name: invoice_id
        tests: [not_null]

  - name: fct_alerts
    description: "Revenue alert table with DROP ALERT / SPIKE ALERT / NORMAL flags."
    columns:
      - name: revenue_date
        tests: [not_null]
      - name: alert_status
        tests:
          - not_null
          - accepted_values:
              values: ['DROP ALERT', 'SPIKE ALERT', 'NORMAL']
